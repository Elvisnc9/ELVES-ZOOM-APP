services:
  # Development services
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "8090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: pluse
      POSTGRES_PASSWORD: "fDciX085PaMBCK6J553J9hKoaYQCv5_c"
    volumes:
      - pluse_data:/var/lib/postgresql/data

  redis:
    image: redis:6.2.6
    ports:
      - "8091:6379"
    command: redis-server --requirepass "RyABkRQ-KsizIgTO72yXwPIEI23dDbiY"
    environment:
      - REDIS_REPLICATION_MODE=master

  # Test services
  postgres_test:
    image: pgvector/pgvector:pg16
    ports:
      - "9090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: pluse_test
      POSTGRES_PASSWORD: "8LVvvz9GcjcuARFzXbOkUyyU3eLk0Imf"
    volumes:
      - pluse_test_data:/var/lib/postgresql/data

  redis_test:
    image: redis:6.2.6
    ports:
      - "9091:6379"
    command: redis-server --requirepass "zzK9e-XR3B1C7z11WJgsNr2uy5tA3XVK"
    environment:
      - REDIS_REPLICATION_MODE=master

volumes:
  pluse_data:
  pluse_test_data:
